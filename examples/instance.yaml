# A full GlitchTip instance. PostgreSQL is provisioned via pgop
# (https://pgop.ruck.io) in the same namespace; the operator composes
# DATABASE_URL from pgop's credentials Secret, runs migrations, bootstraps an
# API token, and (optionally) exposes the UI through a Gateway API HTTPRoute.
apiVersion: glitchtip.ruck.io/v1alpha1
kind: GlitchTip
metadata:
  name: glitchtip
  namespace: glitchtip
spec:
  version: 6.2.2
  domain: https://glitchtip.example.com
  fromEmail: glitchtip@example.com
  # emailUrl: smtp://user:pass@smtp.example.com:587
  web:
    replicas: 1
  worker:
    replicas: 1
  database:
    storageSize: 10Gi
    # deletionPolicy defaults to Retain: deleting this CR keeps the pgop
    # Cluster/Role/Database (and your data) around.
    # clusterRef:            # or point at an existing pgop Cluster:
    #   name: shared-postgres
  valkey:
    enabled: false           # GlitchTip v5.2+ can use PostgreSQL as task broker
  route:
    enabled: true
    parentRefs:
      - name: main-gateway
        namespace: gateways
        sectionName: https
  # Extra GlitchTip settings pass straight through:
  # env:
  #   - name: ENABLE_USER_REGISTRATION
  #     value: "False"
