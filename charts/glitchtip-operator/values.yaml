image:
  repository: ghcr.io/ruckc/glitchtip-operator
  tag: ""          # defaults to .Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

# RUST_LOG filter for the operator process.
logLevel: "info,kube=warn"

replicas: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  # Create the ClusterRole/ClusterRoleBinding. The operator watches its CRDs
  # cluster-wide and writes DSN Secrets into arbitrary app namespaces, so
  # cluster-scoped RBAC is required.
  create: true

podLabels: {}
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
