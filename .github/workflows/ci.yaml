name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - name: crdgen matches chart CRDs
        run: |
          cargo run --bin crdgen > /tmp/crds.yaml
          diff -u charts/glitchtip-operator/crds/glitchtip.ruck.io.yaml /tmp/crds.yaml

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: Azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - run: helm lint charts/glitchtip-operator
      - run: helm template test charts/glitchtip-operator > /dev/null

  e2e:
    runs-on: ubuntu-latest
    # kind cluster bring-up + real image pulls (postgres, glitchtip) can take
    # a while; hack/e2e.sh alone budgets ~30m of kubectl wait time.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: glitchtip-operator

      - name: Install Gateway API CRDs
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.6.1/standard-install.yaml

      - name: Install pgop
        run: |
          helm install pgop oci://ghcr.io/ruckc/charts/pgop \
            --version 0.4.5 \
            --namespace pgop-system \
            --create-namespace \
            --wait --timeout=180s

      - name: Build operator image
        run: docker build -t glitchtip-operator:e2e .

      - name: Load operator image into kind
        run: kind load docker-image glitchtip-operator:e2e --name glitchtip-operator

      # Deployed via the Helm chart (not `cargo run` on the runner) so the
      # operator's live in-cluster HTTP calls (e.g. the bootstrap token ping
      # at http://<name>-web.<ns>.svc:8000) resolve: that ClusterIP DNS name
      # only works from inside the cluster's pod network. The chart's crds/
      # directory installs the glitchtip.ruck.io CRDs as part of the release.
      - name: Deploy operator via Helm chart
        run: |
          helm install glitchtip-operator charts/glitchtip-operator \
            --namespace glitchtip-operator-system \
            --create-namespace \
            --set image.repository=glitchtip-operator \
            --set image.tag=e2e \
            --set image.pullPolicy=Never \
            --wait --timeout=180s

      - name: Run e2e test
        run: hack/e2e.sh

      - name: Dump cluster state
        if: always()
        run: |
          echo "::group::operator logs"
          kubectl logs -n glitchtip-operator-system deployment/glitchtip-operator --tail=1000 | tee operator.log || true
          echo "::endgroup::"
          echo "::group::events"
          kubectl get events -A --sort-by=.lastTimestamp | tail -100 || true
          echo "::endgroup::"
          echo "::group::glitchtip.ruck.io resources"
          kubectl get glitchtips,glitchtiporganizations,glitchtipteams,glitchtipprojects -A -o wide || true
          echo "::endgroup::"
          echo "::group::glitchtip status conditions"
          kubectl get glitchtips -A -o jsonpath='{range .items[*]}{.metadata.namespace}/{.metadata.name}:{"\n"}{.status.conditions}{"\n\n"}{end}' || true
          echo "::endgroup::"
          echo "::group::web/worker pods"
          kubectl get pods -n glitchtip -o wide || true
          kubectl describe pods -n glitchtip -l app.kubernetes.io/component=web || true
          kubectl describe pods -n glitchtip -l app.kubernetes.io/component=worker || true
          echo "::endgroup::"

      - name: Upload operator logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: operator-logs
          path: operator.log
